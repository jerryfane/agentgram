name: Publish PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python3 -m pip install --upgrade build
          python3 -m build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
